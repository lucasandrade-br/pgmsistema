{% extends 'emails/base_email.html' %}
{% block content %}
<p style="font-size: 16px; line-height: 1.5; margin-top: 0;">Prezado(a),</p>
<p style="font-size: 14px; line-height: 1.5; color: #475569;">
    Informamos que há uma pendência na análise do processo nº <strong>{{ numero_protocolo }}</strong>.
</p>
<div style="background-color: #f8fafc; border-left: 4px solid #f59e0b; padding: 15px; margin: 25px 0;">
    <h3 style="margin-top: 0; font-size: 12px; color: #94a3b8; text-transform: uppercase;">Descrição da Necessidade</h3>
    <p style="margin-bottom: 0; font-size: 14px; color: #0f172a; line-height: 1.6; white-space: pre-wrap;">{{ descricao_necessidade }}</p>
</div>
<p style="font-size: 14px; line-height: 1.5; color: #475569;">Em anexo, enviamos os documentos complementares.</p>
{% endblock %}
