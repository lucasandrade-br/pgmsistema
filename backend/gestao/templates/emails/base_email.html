<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>{{ titulo_cabecalho|default:"Procuradoria Geral do Município" }}</title>
</head>
<body style="margin: 0; padding: 0; font-family: Arial, sans-serif; background-color: #f4f4f5; color: #333333;">
    <table width="100%" border="0" cellspacing="0" cellpadding="0" style="background-color: #f4f4f5; padding: 20px;">
        <tr>
            <td align="center">
                <table width="600" border="0" cellspacing="0" cellpadding="0" style="background-color: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
                    <!-- Cabeçalho -->
                    <tr>
                        <td style="background-color: #1e293b; padding: 20px; text-align: center;">
                            <h1 style="color: #ffffff; margin: 0; font-size: 20px;">
                                {{ titulo_cabecalho|default:"Procuradoria Geral do Município" }}
                            </h1>
                        </td>
                    </tr>
                    <!-- Conteúdo principal (sobrescrito por cada template filho) -->
                    <tr>
                        <td style="padding: 30px;">
                            {% block content %}{% endblock %}
                        </td>
                    </tr>
                    <!-- Rodapé -->
                    <tr>
                        <td style="background-color: #f1f5f9; padding: 15px; text-align: center; border-top: 1px solid #e2e8f0;">
                            <p style="font-size: 12px; color: #64748b; margin: 0;">
                                Este é um e-mail automático do Sistema de Gestão de Processos. Por favor, não responda diretamente a este endereço.
                            </p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
